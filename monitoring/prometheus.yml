global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "api-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets:
          - "api-service:8080"

  - job_name: "worker-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets:
          - "distributed-job-processing-platform-worker-service-1:8081"
          - "distributed-job-processing-platform-worker-service-2:8081"
          - "distributed-job-processing-platform-worker-service-3:8081"